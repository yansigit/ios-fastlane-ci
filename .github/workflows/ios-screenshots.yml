name: iOS Screenshots (reusable)

# Reusable screenshot-capture workflow. UI tests across device classes are slow
# and occasionally flaky, so this is manual-only and OFF the release path.
#
#   jobs:
#     screenshots:
#       uses: yansigit/ios-fastlane-ci/.github/workflows/ios-screenshots.yml@main
#       with:
#         upload: ${{ inputs.upload }}
#       secrets:
#         ASC_KEY_ID:     ${{ secrets.ASC_KEY_ID }}
#         ASC_ISSUER_ID:  ${{ secrets.ASC_ISSUER_ID }}
#         ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
#
# Captures (reading the caller's Snapfile), uploads the PNGs as a build artifact,
# and — with upload=true — pushes them to the draft App Store version.

on:
  workflow_call:
    inputs:
      upload:    { type: boolean, default: false }
      runner:    { type: string,  default: "macos-26" }
      xcode:     { type: string,  default: "latest-stable" }
      uses_pods: { type: boolean, default: false }
    secrets:
      ASC_KEY_ID:     { required: false }
      ASC_ISSUER_ID:  { required: false }
      ASC_API_KEY_P8: { required: false }

jobs:
  screenshots:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install CocoaPods
        if: ${{ inputs.uses_pods }}
        run: bundle exec pod install

      - name: Install ImageMagick (frameit caption banners)
        run: brew install imagemagick

      - name: Capture screenshots
        run: bundle exec fastlane screenshots upload:${{ inputs.upload }}
        env:
          # Only needed when upload=true; harmless (unused) otherwise.
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          FASTLANE_SKIP_UPDATE_CHECK: "true"
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-screenshots
          path: fastlane/screenshots/**/*.png
          if-no-files-found: warn
          retention-days: 14
